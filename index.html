<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta</title>

<style>
body{
  font-family: Arial;
  background:#ffe4ec;
  padding:20px;
}
.container{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:600px;
  margin:auto;
}
button{
  background:#ff7aa2;
  border:none;
  padding:10px;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h2>Encuesta</h2>

<form id="form">

<label>Edad:</label><br>
<input type="number" name="edad" required><br><br>

<label>Curso:</label><br>
<input type="text" name="curso" required><br><br>

<label>¿Te gusta el anime?</label><br>
<select name="anime">
<option>Si</option>
<option>No</option>
</select><br><br>

<button type="submit">Enviar</button>
</form>


<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 PEGÁ TU CONFIG ACÁ
const firebaseConfig = {
  apiKey: "AIzaSyC8bdoLzeui9kNGmzwbzGhNQZN2kt272xQ",
  authDomain: "encueesta.firebaseapp.com",
  projectId: "encueesta",
};

// Inicializar
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Guardar datos
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData(e.target);

  const data = {
    edad: formData.get("edad"),
    curso: formData.get("curso"),
    anime: formData.get("anime"),
    fecha: new Date().toISOString()
  };

  try{
    await addDoc(collection(db, "respuestas"), data);
    alert("Guardado correctamente");
    e.target.reset();
  }catch(err){
    console.error(err);
    alert("Error al guardar");
  }
});

// Ver datos
window.verDatos = async ()=>{
  const querySnapshot = await getDocs(collection(db, "respuestas"));
  let texto = "";

  querySnapshot.forEach(doc=>{
    texto += JSON.stringify(doc.data(), null, 2) + "\n\n";
  });

  document.getElementById("output").textContent = texto;
};
</script>

</body>
</html>
